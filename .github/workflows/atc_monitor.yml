name: ATC Re-announcement Monitor

# Runs at :07 and :37 — offset from the FIFA monitor's quarter-hour cron so
# the two workflows don't race for `git push` on the shared `state/` directory.
on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        type: choice
        options: [run, test, list]
        default: run

permissions:
  contents: write

concurrency:
  group: atc-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ATC monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MODE: ${{ github.event.inputs.mode || 'run' }}
        run: |
          set -euo pipefail
          case "$MODE" in
            test) python atc_monitor.py --test ;;
            list) python atc_monitor.py --list-state ;;
            run|"") python atc_monitor.py ;;
            *) echo "Unknown mode: $MODE" >&2; exit 1 ;;
          esac

      - name: Commit updated state
        if: ${{ (github.event.inputs.mode || 'run') == 'run' }}
        run: |
          set -euo pipefail
          git config user.name "atc-monitor-bot"
          git config user.email "atc-monitor-bot@users.noreply.github.com"
          # Only stage ATC-owned state files — never touch FIFA monitor state.
          git add state/atc_page.hash state/atc_keywords_seen.json state/atc_failures.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No ATC state changes to commit."
            exit 0
          fi
          git commit -m "chore(state): update ATC monitor state [skip ci]"
          # Rebase onto any FIFA-monitor commits that landed during our run,
          # then push. Retry once if the remote moved again mid-push.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $attempt failed; retrying..."
            sleep 5
          done
          echo "push failed after retries" >&2
          exit 1

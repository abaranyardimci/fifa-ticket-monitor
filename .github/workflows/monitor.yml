name: FIFA WC2026 Ticket Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        type: choice
        options: [run, test, list]
        default: run
      target:
        description: 'Specific target (only for mode=run)'
        type: choice
        options: [all, news, sales_info, shop]
        default: all

permissions:
  contents: write

concurrency:
  group: fifa-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ github.event.inputs.mode || 'run' }}
          TGT: ${{ github.event.inputs.target || 'all' }}
        run: |
          set -euo pipefail
          case "$MODE" in
            test) python monitor.py --test ;;
            list) python monitor.py --list-targets ;;
            run|"")
              if [ "$TGT" = "all" ] || [ -z "$TGT" ]; then
                python monitor.py
              else
                python monitor.py --target "$TGT"
              fi
              ;;
            *) echo "Unknown mode: $MODE" >&2; exit 1 ;;
          esac

      - name: Commit updated state
        if: ${{ (github.event.inputs.mode || 'run') == 'run' }}
        run: |
          set -euo pipefail
          git config user.name "fifa-monitor-bot"
          git config user.email "fifa-monitor-bot@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(state): update monitor state [skip ci]"
            git push
          fi
